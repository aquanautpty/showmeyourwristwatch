<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>
  <!-- strap top -->
  <rect x="40" y="6" width="20" height="20" rx="4" fill="#1c1c1c" stroke="#10b981" stroke-width="2"/>
  <!-- strap bottom -->
  <rect x="40" y="74" width="20" height="20" rx="4" fill="#1c1c1c" stroke="#10b981" stroke-width="2"/>
  <!-- watch case -->
  <circle cx="50" cy="50" r="28" fill="#1c1c1c" stroke="#10b981" stroke-width="2.5"/>
  <!-- inner dial -->
  <circle cx="50" cy="50" r="21" fill="#0a0a0a"/>
  <!-- question mark -->
  <text x="50" y="64" text-anchor="middle" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="32" font-weight="900" fill="#10b981">?</text>
</svg>
